# LibreClinica MUW Ophthalmology — local development stack
# Department of Ophthalmology and Optometry, Medical University of Vienna
name: libreclinica-muw

services:
  libreclinica:
    build: .
    image: libreclinica-muw:dev
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - db
    develop:
      watch:
        # restart on config file changes
        - action: sync+restart
          path: ./docker/config
          target: /usr/local/tomcat/libreclinica.config

        # rebuild on source file changes
        - action: rebuild
          path: ./core

        - action: rebuild
          path: ./odm

        - action: rebuild
          path: ./web
        # ws/ module removed in PR #31; nothing to watch there any more.

  db:
    image: docker.io/library/postgres:14-alpine
    environment:
      POSTGRES_PASSWORD: clinica
      POSTGRES_USER: clinica
      POSTGRES_DB: libreclinica
    # Named volume so the in-browser install (first-run wizard,
    # sysadmin account, sample study) survives `docker compose down`.
    # Without it, every smoke run starts on an empty user_account
    # table and login lands on /pages/login/login. Wipe via:
    #   docker compose down -v
    volumes:
      - libreclinica-db-data:/var/lib/postgresql/data

  smtp:
    image: docker.io/marlonb/mailcrab:v1.1.0
    ports:
      - "127.0.0.1:1080:1080"

volumes:
  libreclinica-db-data:
