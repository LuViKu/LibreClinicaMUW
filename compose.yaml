# LibreClinica MUW Ophthalmology — local development stack
# Department of Ophthalmology and Optometry, Medical University of Vienna
name: libreclinica-muw

services:
  libreclinica:
    build: .
    image: libreclinica-muw:dev
    ports:
      # Dev binds loopback (default). Production publishes on a routable
      # interface for the separate-host reverse proxy by setting
      # LIBRECLINICA_BIND_ADDR=0.0.0.0 in /etc/libreclinica/env. This is the
      # SINGLE source of truth for the bind — do NOT add a second ports entry
      # in an overlay file: Compose *concatenates* ports lists across files,
      # which produces a conflicting double-bind on 8080 and publishes nothing.
      - "${LIBRECLINICA_BIND_ADDR:-127.0.0.1}:8080:8080"
    depends_on:
      - db
    # Phase D.3 (DR-014): forward libreclinica.sso.* env vars from the
    # host shell so deployments can flip SSO on/off and override
    # institutional defaults (provider name, trusted-proxy CIDRs,
    # button label, etc.) without rebuilding the image. All keys
    # default to safe values in application.yml; the `:-` fallbacks
    # here let `docker compose up` work with none set on the host.
    environment:
      LIBRECLINICA_SSO_ENABLED: "${LIBRECLINICA_SSO_ENABLED:-false}"
      LIBRECLINICA_SSO_PRINCIPAL_HEADER: "${LIBRECLINICA_SSO_PRINCIPAL_HEADER:-REMOTE_USER}"
      LIBRECLINICA_SSO_EMAIL_HEADER: "${LIBRECLINICA_SSO_EMAIL_HEADER:-mail}"
      LIBRECLINICA_SSO_DISPLAY_NAME_HEADER: "${LIBRECLINICA_SSO_DISPLAY_NAME_HEADER:-displayName}"
      LIBRECLINICA_SSO_PROVIDER: "${LIBRECLINICA_SSO_PROVIDER:-shibboleth-meduniwien}"
      LIBRECLINICA_SSO_PROVISIONING: "${LIBRECLINICA_SSO_PROVISIONING:-LOOKUP_ONLY}"
      LIBRECLINICA_SSO_DEFAULT_ROLE: "${LIBRECLINICA_SSO_DEFAULT_ROLE:-ROLE_USER}"
      LIBRECLINICA_SSO_TRUSTED_CIDRS: "${LIBRECLINICA_SSO_TRUSTED_CIDRS:-127.0.0.1/32,172.16.0.0/12,10.0.0.0/8,192.168.0.0/16}"
      LIBRECLINICA_SSO_ENTRY_URL: "${LIBRECLINICA_SSO_ENTRY_URL:-/sso/login}"
      LIBRECLINICA_SSO_BUTTON_LABEL: "${LIBRECLINICA_SSO_BUTTON_LABEL:-Sign in with Institutional Account}"
      LIBRECLINICA_SSO_DELEGATE_MFA: "${LIBRECLINICA_SSO_DELEGATE_MFA:-true}"
      LIBRECLINICA_SSO_REAUTH: "${LIBRECLINICA_SSO_REAUTH:-false}"
      # In-app bug-report mail destination (Phase E). Empty by default;
      # set on the host to wire BugReportApiController to a real inbox.
      LIBRECLINICA_BUG_REPORT_RECIPIENT: "${LIBRECLINICA_BUG_REPORT_RECIPIENT:-}"
      # Phase E.5 chronic CI fix (2026-06-03): runs the demo-data
      # Liquibase changesets (M-001..M-007 subjects + CRFs +
      # discrepancy notes + demo users physician/monitor) on dev
      # compose only. Production deployments leave this unset so the
      # WAR boots against a clean schema. CI integration-tests also
      # leave it unset so legacy DBUnit DAO tests aren't blocked by
      # the seed's dn_item_data_map FK rows.
      LIQUIBASE_CONTEXTS: "${LIQUIBASE_CONTEXTS:-demo}"
    develop:
      watch:
        # restart on config file changes
        - action: sync+restart
          path: ./docker/config
          target: /usr/local/tomcat/libreclinica.config

        # rebuild on source file changes
        - action: rebuild
          path: ./core

        - action: rebuild
          path: ./odm

        - action: rebuild
          path: ./web
        # ws/ module removed in PR #31; nothing to watch there any more.

  db:
    image: docker.io/library/postgres:14-alpine
    environment:
      POSTGRES_PASSWORD: clinica
      POSTGRES_USER: clinica
      POSTGRES_DB: libreclinica
    # Named volume so the in-browser install (first-run wizard,
    # sysadmin account, sample study) survives `docker compose down`.
    # Without it, every smoke run starts on an empty user_account
    # table and login lands on /pages/login/login. Wipe via:
    #   docker compose down -v
    volumes:
      - libreclinica-db-data:/var/lib/postgresql/data

  smtp:
    image: docker.io/marlonb/mailcrab:v1.1.0
    ports:
      - "127.0.0.1:1080:1080"

  # Phase E.7 (2026-06-10): retinal inference sidecar.
  # FastAPI sync /screen + Postgres-as-queue background worker (single
  # container, two sibling processes). v1 ships the deterministic
  # PlaceholderAdapter — flip RETINAL_INFERENCE_ADAPTER=mirage once the
  # real MIRAGE-based model lands. Task-agnostic by design; v1 enables
  # task='ga' only (geographic atrophy / cRORA segmentation).
  retinal-inference:
    build: ./retinal-inference
    # Explicit `image:` tag — without it `docker compose up --no-build`
    # looks up the auto-generated `<project_name>-<service_name>:latest`
    # (`libreclinica-muw-retinal-inference:latest`) but `docker buildx
    # bake` only stores the build output by digest unless the target has
    # a name. Mirrors what the `libreclinica` service already has
    # (`image: libreclinica-muw:dev` above) so the CI workflow's bake
    # step can pre-load both images for `compose up --no-build`.
    image: libreclinica-muw-retinal-inference:latest
    container_name: libreclinica-muw-retinal-inference-1
    depends_on:
      - db
    environment:
      RETINAL_INFERENCE_INFERENCE_ADAPTER: ${RETINAL_INFERENCE_ADAPTER:-placeholder}
      RETINAL_INFERENCE_DB_URL: postgresql://clinica:clinica@db:5432/libreclinica
      RETINAL_INFERENCE_SHARED_STORAGE_PATH: /var/lib/libreclinica/segmentation-output
      RETINAL_INFERENCE_E2E_UPLOADS_PATH: /var/lib/libreclinica/e2e-uploads
    volumes:
      - ./docker/retinal-inference-storage:/var/lib/libreclinica/segmentation-output
      - ./docker/e2e-uploads:/var/lib/libreclinica/e2e-uploads:ro
    cpus: "4.0"
    mem_limit: 4g

volumes:
  libreclinica-db-data:
