name: CodeQL

on:
  push:
    branches: [lc-develop, master]
  pull_request:
    branches: [lc-develop, master]
  schedule:
    # Weekly Monday 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL analyze (java)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-extended,security-and-quality

      # Manual build steps - CodeQL's autobuild often fails on multi-module
      # legacy projects with custom plugin chains. Match exactly what the build
      # job in .github/workflows/build.yml does so the coverage matches.
      - name: Maven compile (no tests)
        run: mvn -B -ntp -DskipTests=true clean compile

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:java
