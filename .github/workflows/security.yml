name: Security scan

on:
  push:
    branches: [lc-develop, master]
  pull_request:
    branches: [lc-develop, master]
  schedule:
    # Daily 04:00 UTC - picks up newly-published CVEs against pinned deps.
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          # Don't fail the build on findings - report-only until we triage the
          # initial backlog. Switch to exit-code: 1 once Phase A.2 lands.
          exit-code: '0'

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  owasp-dependency-check:
    name: OWASP dependency-check (Maven deps)
    runs-on: ubuntu-latest
    # Scheduled + manual only - the NVD database download on first run takes
    # ~10 min and CVE refreshes burn API quota on every commit otherwise.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: Run OWASP dependency-check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mvn -B -ntp org.owasp:dependency-check-maven:check \
            -DskipTestScope=true \
            -DnvdApiKey="${NVD_API_KEY:-}" \
            -DfailBuildOnCVSS=8 \
            || echo "::warning::dependency-check found CVSS>=8 issues - see report"

      - name: Upload OWASP HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: '**/target/dependency-check-report.*'
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload OWASP SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: target/dependency-check-report.sarif
          category: owasp-dependency-check
        continue-on-error: true

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
