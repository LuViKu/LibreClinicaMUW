name: Build

# Triggers tuned 2026-05-28 to save GitHub Actions credits: previously
# fired on every push to feature/**/release/**/hotfix/** plus PRs plus
# lc-develop/master post-merge, which during autonomous Phase B work
# burned 3+ runs per PR. Now: one run per merge to lc-develop/master,
# release/hotfix tip pushes (rare), and explicit manual dispatch.
# If you want pre-merge validation on a feature branch, use
# `gh workflow run build.yml --ref <branch>` or push to release/hotfix.
on:
  push:
    branches: [lc-develop, master, "release/**", "hotfix/**"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Maven build & unit tests (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Phase B.1: single JDK 21 entry matching the Dockerfile builder + runtime
        # (maven:3-eclipse-temurin-21 + tomcat:10-jdk21 since Phase B.6).
        java: ['21']
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      # Phase E.5 #14 — mock-removal regression guard. M13 deleted every
      # SPA mock fixture + the VITE_USE_MOCK_API escape hatch; this step
      # fails CI if any future commit reintroduces them. Doc-comment
      # references in store javadoc blocks (lines starting with ` * ` or
      # `// `) are intentionally allowed — they document the removal.
      - name: Mock-removal regression guard
        run: |
          set +e
          matches=$(grep -rnE \
            'import\.meta\.env\.VITE_USE_MOCK_API|^[^*/]*\bloadMock\(|^[^*/]*\b(const|let|var)[[:space:]]+MOCK_[A-Z_]+[[:space:]]*[=:]' \
            web/src/spa/src --include='*.ts' --include='*.vue')
          set -e
          if [ -n "$matches" ]; then
            echo "::error::Mock-removal regression — active code reintroduces SPA mock surface:"
            echo "$matches"
            echo
            echo "If this is intentional (e.g., a new mock fixture for an offline-dev tool),"
            echo "update the regex in .github/workflows/build.yml and document the exception."
            exit 1
          fi
          echo "OK — no active mock-code reintroductions."

      - name: Maven package (with unit tests)
        run: mvn -B -ntp -DskipTests=false package

      # Phase E.6 ci-gap — Maven's pnpm-build step runs vue-tsc + vite
      # build but NOT vitest. The growing SPA spec suite (~626 tests as
      # of 2026-06-07) was never gated. Run it explicitly so a failing
      # store/component test blocks merges. node_modules is already
      # warmed by the Maven frontend-maven-plugin step above; invoke
      # vitest via its local bin (pnpm isn't on the runner PATH outside
      # the Maven plugin's sandbox).
      - name: SPA vitest suite
        working-directory: web/src/spa
        run: node_modules/.bin/vitest run --reporter=basic

      - name: Upload WAR artifacts
        if: matrix.java == '21' && success()
        uses: actions/upload-artifact@v4
        with:
          name: libreclinica-wars
          path: |
            web/target/*.war
          retention-days: 14
          # ws/target/*.war dropped — the ws/ module was retired in
          # Phase B.4 (PR #31). The path matched zero artifacts post-
          # removal; if-no-files-found: warn would have surfaced this
          # but the noise wasn't useful.
          if-no-files-found: warn

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-jdk${{ matrix.java }}
          path: '**/target/surefire-reports/**'
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload JaCoCo coverage reports
        if: matrix.java == '21' && always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-jdk${{ matrix.java }}
          path: |
            **/target/site/jacoco/**
            **/target/jacoco.exec
          retention-days: 14
          if-no-files-found: ignore

      - name: Surface coverage summary in job log
        if: matrix.java == '21' && always()
        run: |
          set +e
          for csv in $(find . -path '*/target/site/jacoco/jacoco.csv' 2>/dev/null); do
            module=$(echo "$csv" | awk -F'/' '{print $2}')
            echo "::group::Coverage — ${module}"
            # Skip header; sum INSTRUCTION_MISSED and INSTRUCTION_COVERED columns.
            awk -F',' 'NR>1 { miss+=$4; cov+=$5 } END {
              total=miss+cov;
              if (total==0) { print "  (no instrumented instructions)" }
              else printf "  Instruction coverage: %d / %d (%.1f%%)\n", cov, total, (cov*100.0/total)
            }' "$csv"
            echo "::endgroup::"
          done

  integration-tests:
    # Runs the DB-dependent tests excluded from the default surefire run
    # (DAO + rule-service tests extending HibernateOcDbTestCase / OcDbTestCase).
    # The Spring test context bootstraps the schema via SpringLiquibase against
    # database 'openclinica-TEST' on the postgres service container below
    # (user 'clinica' / password 'clinica' per core/src/test/resources/datainfo.properties).
    # Phase 0.2 + 0.3 (2026-05-28) wired this up end-to-end - see MIGRATION.md.
    name: Integration tests (Postgres ${{ matrix.postgres }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres: ['14-alpine']
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: clinica
          POSTGRES_PASSWORD: clinica
          POSTGRES_DB: openclinica-TEST
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clinica -d openclinica-TEST"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Maven verify (integration-tests profile)
        run: mvn -B -ntp -P integration-tests -DskipTests=false test

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-integration
          path: |
            **/target/surefire-reports/**
            **/target/openclinica-test.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload JaCoCo coverage from integration tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-integration
          path: |
            **/target/site/jacoco/**
            **/target/jacoco.exec
          retention-days: 14
          if-no-files-found: ignore

  smoke-test:
    name: Compose smoke test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the libreclinica image via bake with GitHub Actions cache
      # backend.
      #
      # Phase E.5 chronic CI fix (2026-06-03): mode=max → mode=min.
      # The previous mode=max stored every intermediate layer to GHA
      # cache (the BuildKit `--mount=type=cache` /root/.m2 layer alone
      # is multi-GB), and the cache transfer back to the runner on each
      # smoke job became the bottleneck — multiple PR builds in a row
      # got stuck for 25-45+ min on the "Build libreclinica image" step
      # before the user cancelled them. mode=min only caches the final
      # image layers, dropping the cache transfer to a few hundred MB.
      # The trade-off: BuildKit `--mount=type=cache` directives in the
      # Dockerfile no longer survive across runs, so the Maven
      # dep-download layer rebuilds cold-cache each time (+ ~3-5 min on
      # a runner-local Maven download). Net: slower per-build wall-clock
      # vs. mode=max BEST CASE, but no infinity-stuck WORST CASE.
      - name: Build libreclinica image (cached)
        uses: docker/bake-action@v5
        with:
          files: compose.yaml
          targets: libreclinica
          load: true
          set: |
            *.cache-from=type=gha,scope=smoke-${{ github.workflow }}
            *.cache-to=type=gha,scope=smoke-${{ github.workflow }},mode=min

      - name: Compose up (uses pre-built image)
        run: docker compose up --detach --no-build

      - name: Wait for application to be reachable
        run: |
          set -e
          for i in $(seq 1 60); do
            if curl --silent --fail --output /dev/null http://127.0.0.1:8080/LibreClinica/; then
              echo "Application reachable after ${i}0s"
              exit 0
            fi
            sleep 10
          done
          echo "Application did not become reachable within 10 minutes"
          docker compose logs --tail 200
          exit 1

      # Phase E.0 (2026-05-30): the original smoke step above only probed `/`
      # which 302s to the login page — it never noticed when the login page
      # itself returned 404 or 500. This step follows the redirect chain and
      # explicitly asserts that the high-value `/pages/*` routes resolve.
      # See post-Phase-D UI validation report + Phase E.0 sub-phase.
      #
      # Phase E.5 chronic CI fix (2026-06-03): one entry dropped, one restored.
      #   - `/pages/odmk/odm/v1/Studies`: no Spring MVC handler exists for
      #     this exact URL. OdmController only registers `/odmk/studies/{oid}/metadata`
      #     and `/odmk/study/{oid}/studysubject/{oid}/events`; ODMMetadataRestResource
      #     uses JAX-RS (`@Path("/metadata")`) but no Jersey servlet is wired
      #     in web.xml. The route was added speculatively by PR #51 (Phase E.4)
      #     based on a stale design doc; it has always 404'd. Removed.
      #   - `/pages/sso/reauth`: restored. The "404 in CI / 302 locally" gap
      #     turned out to be a context-path bug in SsoReauthController, not
      #     a wiring race in the pages DispatcherServlet's child context.
      #     The endpoint emitted `Location: /pages/login/login` (without
      #     the /LibreClinica servlet-context prefix); curl --location then
      #     followed that to an out-of-context URL where Tomcat returned 404.
      #     The local HEAD probe (no follow) showed the 302 directly so the
      #     bug hid in dev. Fixed by setContextRelative(true) on the
      #     RedirectView in the controller — the Location header is now
      #     `/LibreClinica/pages/login/login` and the follow-redirect lands
      #     on the legacy login JSP as intended.
      - name: Smoke key /pages/* routes
        run: |
          set -e
          BASE=http://127.0.0.1:8080/LibreClinica
          ROUTES=(
            "/"
            "/pages/login/login"
            "/pages/sso/reauth"
          )
          fail=0
          for r in "${ROUTES[@]}"; do
            code=$(curl --silent --location --output /dev/null --write-out '%{http_code}' "$BASE$r")
            # Treat 200, 302 (auth redirect), 401, 403 as expected; only flag 404/500.
            case "$code" in
              200|302|401|403) echo "  OK    $code  $r" ;;
              *)               echo "  FAIL  $code  $r"; fail=1 ;;
            esac
          done
          if [ $fail -ne 0 ]; then
            echo "::error::At least one /pages/* route returned an error code."
            docker compose logs --tail 200
            exit 1
          fi

      # Phase E.5 #9 — OpenAPI codegen drift guard.
      #
      # B3 shipped the springdoc dep + the `pnpm run codegen:openapi`
      # script but deferred the CI automation. This step closes that
      # gap: with the compose stack already up from the smoke build,
      # fetch the live OpenAPI spec, regenerate
      # web/src/spa/src/types/api.ts via openapi-typescript, and fail
      # CI if the regenerated file differs from the committed one.
      # That way SPA TS types can't silently drift away from the
      # backend contract — any new/changed REST endpoint forces an
      # accompanying api.ts refresh in the same PR.
      #
      # Node 20 (matches the frontend-maven-plugin nodeVersion in
      # web/pom.xml). pnpm via corepack — same toolchain the
      # Maven SPA build uses, so install behaviour is identical.
      - name: Set up Node.js for OpenAPI codegen
        uses: actions/setup-node@v4
        with:
          node-version: '20.17.0'

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.10.0 --activate

      - name: Fetch live OpenAPI spec
        run: |
          set -e
          # Phase E.5 follow-up (2026-06-01): springdoc beans live in the
          # `pages` DispatcherServlet child context; the API-docs path is
          # configured as /pages/v3/api-docs in application.yml so the URL
          # flows through the same dispatcher that hosts the controllers.
          curl --silent --fail \
            http://127.0.0.1:8080/LibreClinica/pages/v3/api-docs/spa-api \
            -o /tmp/openapi-spa.json
          # Sanity: spec must be a non-trivial JSON document AND must
          # describe at least one path. The earlier B3 comment about a
          # tolerated empty-paths shape was a known-limitation workaround;
          # with the springdoc-pages-dispatcher fix in place, paths={} is
          # now a regression — assert non-empty.
          size=$(wc -c < /tmp/openapi-spa.json)
          echo "Spec size: ${size} bytes"
          if [ "$size" -lt 100 ]; then
            echo "::error::OpenAPI spec is suspiciously small (< 100 bytes)."
            cat /tmp/openapi-spa.json
            exit 1
          fi
          if ! python3 -c "import json,sys; d=json.load(open('/tmp/openapi-spa.json')); sys.exit(0 if d.get('paths') else 1)"; then
            echo "::error::OpenAPI spec has empty 'paths' — springdoc is not introspecting the /api/v1/** controllers."
            head -c 600 /tmp/openapi-spa.json
            exit 1
          fi

      - name: Regenerate SPA OpenAPI TS types
        working-directory: web/src/spa
        run: |
          pnpm install --frozen-lockfile --prefer-offline
          pnpm run codegen:openapi

      - name: Fail on api.ts drift
        run: |
          if ! git diff --exit-code web/src/spa/src/types/api.ts; then
            echo "::error::OpenAPI spec drift — the committed web/src/spa/src/types/api.ts is out of date with the live backend spec. Run 'pnpm run codegen:openapi' locally against a running stack and commit the regenerated file."
            exit 1
          fi
          echo "OK — api.ts matches the live OpenAPI spec."

      - name: Compose down
        if: always()
        run: docker compose down --volumes --remove-orphans
