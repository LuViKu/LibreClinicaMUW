name: Build

# Triggers tuned 2026-05-28 to save GitHub Actions credits: previously
# fired on every push to feature/**/release/**/hotfix/** plus PRs plus
# lc-develop/master post-merge, which during autonomous Phase B work
# burned 3+ runs per PR. Now: one run per merge to lc-develop/master,
# release/hotfix tip pushes (rare), and explicit manual dispatch.
# If you want pre-merge validation on a feature branch, use
# `gh workflow run build.yml --ref <branch>` or push to release/hotfix.
on:
  push:
    branches: [lc-develop, master, "release/**", "hotfix/**"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Maven build & unit tests (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Phase B.1: single JDK 21 entry matching the Dockerfile builder + runtime
        # (maven:3-eclipse-temurin-21 + tomcat:9-jdk21).
        java: ['21']
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Maven package (with unit tests)
        run: mvn -B -ntp -DskipTests=false package

      - name: Upload WAR artifacts
        if: matrix.java == '21' && success()
        uses: actions/upload-artifact@v4
        with:
          name: libreclinica-wars
          path: |
            web/target/*.war
            ws/target/*.war
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-jdk${{ matrix.java }}
          path: '**/target/surefire-reports/**'
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload JaCoCo coverage reports
        if: matrix.java == '21' && always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-jdk${{ matrix.java }}
          path: |
            **/target/site/jacoco/**
            **/target/jacoco.exec
          retention-days: 14
          if-no-files-found: ignore

      - name: Surface coverage summary in job log
        if: matrix.java == '21' && always()
        run: |
          set +e
          for csv in $(find . -path '*/target/site/jacoco/jacoco.csv' 2>/dev/null); do
            module=$(echo "$csv" | awk -F'/' '{print $2}')
            echo "::group::Coverage — ${module}"
            # Skip header; sum INSTRUCTION_MISSED and INSTRUCTION_COVERED columns.
            awk -F',' 'NR>1 { miss+=$4; cov+=$5 } END {
              total=miss+cov;
              if (total==0) { print "  (no instrumented instructions)" }
              else printf "  Instruction coverage: %d / %d (%.1f%%)\n", cov, total, (cov*100.0/total)
            }' "$csv"
            echo "::endgroup::"
          done

  integration-tests:
    # Runs the DB-dependent tests excluded from the default surefire run
    # (DAO + rule-service tests extending HibernateOcDbTestCase / OcDbTestCase).
    # The Spring test context bootstraps the schema via SpringLiquibase against
    # database 'openclinica-TEST' on the postgres service container below
    # (user 'clinica' / password 'clinica' per core/src/test/resources/datainfo.properties).
    # Phase 0.2 + 0.3 (2026-05-28) wired this up end-to-end - see MIGRATION.md.
    name: Integration tests (Postgres ${{ matrix.postgres }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres: ['14-alpine']
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: clinica
          POSTGRES_PASSWORD: clinica
          POSTGRES_DB: openclinica-TEST
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clinica -d openclinica-TEST"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Maven verify (integration-tests profile)
        run: mvn -B -ntp -P integration-tests -DskipTests=false test

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-integration
          path: |
            **/target/surefire-reports/**
            **/target/openclinica-test.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload JaCoCo coverage from integration tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-integration
          path: |
            **/target/site/jacoco/**
            **/target/jacoco.exec
          retention-days: 14
          if-no-files-found: ignore

  smoke-test:
    name: Compose smoke test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the libreclinica image via bake with GitHub Actions cache
      # backend. mode=max also caches intermediate (non-final) layers,
      # which is what makes the BuildKit `--mount=type=cache` directives
      # in the Dockerfile actually survive across runs.
      #
      # First run on a fresh cache populates ~500 MB of Maven artifacts
      # and is the same ~8 minutes as before. Subsequent runs whose poms
      # have not changed reuse the dependency layer entirely and the
      # smoke build drops to ~30-60 seconds.
      - name: Build libreclinica image (cached)
        uses: docker/bake-action@v5
        with:
          files: compose.yaml
          targets: libreclinica
          load: true
          set: |
            *.cache-from=type=gha,scope=smoke-${{ github.workflow }}
            *.cache-to=type=gha,scope=smoke-${{ github.workflow }},mode=max

      - name: Compose up (uses pre-built image)
        run: docker compose up --detach --no-build

      - name: Wait for application to be reachable
        run: |
          set -e
          for i in $(seq 1 60); do
            if curl --silent --fail --output /dev/null http://127.0.0.1:8080/LibreClinica/; then
              echo "Application reachable after ${i}0s"
              exit 0
            fi
            sleep 10
          done
          echo "Application did not become reachable within 10 minutes"
          docker compose logs --tail 200
          exit 1

      - name: Compose down
        if: always()
        run: docker compose down --volumes --remove-orphans
