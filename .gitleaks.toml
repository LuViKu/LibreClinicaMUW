# Gitleaks configuration — Phase E.0 follow-up (2026-05-31).
#
# Extends the upstream default rule set and adds allowlists for the
# historical-OpenClinica false positives that broke the Security-scan
# workflow on lc-develop @ dccfc86e2:
#
#   72 leaks found — all `generic-api-key` rule hits on JSP
#   <fmt:message key="..."> i18n bundle-key strings in the 2009-era
#   `ws/` and `web/src/main/webapp/WEB-INF/jsp/managestudy/*.jsp`
#   files (commit adba9a97, "OpenClinica 3.0 initial drop").
#
# The matched strings are short, all-lowercase / mixed-case
# message-bundle keys (e.g. "subject_signature_required") whose
# Shannon entropy happens to clear gitleaks's generic-api-key
# entropy threshold (3.5). They are not credentials; the values they
# look up are loaded at runtime from
# `org.akaza.openclinica.i18n.words` resource bundles.
#
# Two-layer allowlist:
#
#  1. Path allowlist (below, scope = `[allowlist]`) — exclude all
#     `*.jsp` files and the deleted `ws/` module from EVERY rule.
#     JSPs are server-rendered templates; the institutional convention
#     is that real secrets never live in them (they live in
#     `docker/datainfo.properties` + env vars at runtime).
#
#  2. Stopword-style regex allowlist on `generic-api-key` — covers any
#     stray `<fmt:message key="...">` that ends up in non-JSP files
#     (e.g. .tag, .tagx) or future copies.
#
# Real secrets in JSPs / `ws/` would still be caught by the more
# specific rules (`aws-access-token`, `private-key`, `slack-token`,
# `stripe-access-token`, etc.) because those are NOT bypassed by the
# generic-api-key allowlist below.

# `useDefault = true` re-uses the upstream rule set from
# https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
[extend]
useDefault = true

# Global allowlist — applies to every rule.
[allowlist]
description = "Historical OpenClinica JSP i18n bundle keys + retired modules"
paths = [
  # Phase B.0 retired the `ws/` SOAP module entirely. Its commits live
  # in history but no current file references them; they should not
  # gate Phase E.
  '''^ws/.*''',
  # `web/src/main/webapp/WEB-INF/jsp/managestudy/*.jsp` and a handful
  # of sibling JSP directories are full of `<fmt:message key="...">`
  # strings that the upstream generic-api-key rule flags by entropy.
  # Allowlist the entire JSP tree per the rationale at the top of this
  # file; specific-format secret rules (AWS, Stripe, etc.) still apply.
  '''^web/src/main/webapp/WEB-INF/jsp/.*\.jsp$''',
  # Two binaries that travelled in from the 2009 OpenClinica drop and
  # gitleaks flags as high-entropy. Either retired in Phase B or kept
  # as opaque artefacts.
  '''^.+\.(dll|so|class|jar|war)$''',

  # Phase B.11 (commit 4f531f9f7, 2026-05-29) renamed every Java
  # package from `org.akaza.openclinica.*` to
  # `at.ac.meduniwien.ophthalmology.libreclinica.*`. The post-rename
  # tree is the canonical source; the pre-rename paths under
  # `org/akaza/openclinica/` no longer exist in HEAD but persist in
  # git history. gitleaks's default `--full-history --all` scan walks
  # those historical commits and flags the JavaDoc API-key example
  # values that came in with the upstream OpenClinica 3.0 drop in
  # 2009 (e.g. `"apiKey": "5f462a16b3b04b1b9747262968bd5d2f"` shown
  # in the `/createuseraccount` REST controller documentation). The
  # matching documentation examples in the current
  # `at.ac.meduniwien.*` copies are not credentials — they show the
  # SHAPE of an API key, the values themselves are demo-only and
  # never deployed. Real secrets live in `docker/datainfo.properties`
  # + env vars at runtime per the institutional convention. Allowlist
  # the historical org.akaza tree across every module.
  '''(^|/)org/akaza/openclinica/.*\.java$''',

  # Password-encoder unit tests use developer-readable plaintext
  # fixtures (e.g. `RAW_PASSWORD = "muw-d1-legacy-pin"` in
  # LegacyMd5Sha1PasswordEncoderTest.java line 33) to assert that a
  # given input produces a known hash. The values are deliberately
  # stable for regression testing and are NOT deployed credentials.
  # Allowlist all `*PasswordEncoder*Test.java` files under the test
  # sources of every module.
  '''(^|/)src/test/java/.*PasswordEncoder[A-Za-z0-9]*Test\.java$''',
]

# Targeted allowlist for the `generic-api-key` rule — covers JSPs that
# slip past the path allowlist (e.g. `.jsp.bak`, custom suffixes).
[[rules]]
id = "generic-api-key"
[rules.allowlist]
description = "i18n message-bundle keys in JSP <fmt:message> tags"
regexTarget = "line"
regexes = [
  # Anything appearing inside a JSP fmt:message tag is a bundle key,
  # not an API key.
  '''<fmt:message\s+key=''',
  # Spring Security / Boot config-property paths used in JSP
  # debug output occasionally match the generic rule.
  '''libreclinica\.sso\.''',
]
