# LibreClinica MUW Ophthalmology — Apache + mod_shib vhost
# Department of Ophthalmology and Optometry, Medical University of Vienna
#
# Phase D.7 (DR-014): proxies authenticated requests from the reverse
# proxy to Tomcat (libreclinica:8080). Shibboleth-protected requests
# carry the configured headers (REMOTE_USER + attributes) which
# LibreClinica's RequestHeaderAuthenticationFilter consumes.
#
# Bypass routes: /pages/login/login + the static asset paths skip
# Shibboleth auth so local-account users (sponsor monitors, demo
# accounts, break-glass) can sign in via username/password without
# being redirected to the IdP.

ServerName libreclinica.local
ServerAdmin ophthalmology-it@meduniwien.ac.at

# Forward the upstream Apache IP via X-Forwarded-* so Tomcat sees the
# real remote address — needed by Phase D.3's
# TrustedProxyRequestHeaderAuthenticationFilter CIDR allowlist
# (compose-internal network IPs in 172.16/12 by default).
ProxyPreserveHost On
ProxyPass / http://libreclinica:8080/ retry=0
ProxyPassReverse / http://libreclinica:8080/
RequestHeader unset REMOTE_USER

<Location />
    # By default, every request must be Shibboleth-authenticated.
    AuthType shibboleth
    ShibRequestSetting requireSession 1
    Require valid-user

    # After auth, propagate the SP-derived attributes as request
    # headers. LibreClinica's RequestHeaderAuthenticationFilter
    # reads `REMOTE_USER` per libreclinica.sso.header.principal.
    ShibUseHeaders On
</Location>

# Bypass: /pages/login/login renders the LibreClinica login JSP with
# both the SSO button (configured by libreclinica.sso.enabled=true)
# and the local username/password form. The bypass lets sponsor /
# demo / break-glass accounts log in without IdP friction.
<Location /LibreClinica/pages/login/login>
    AuthType None
    Require all granted
</Location>
<Location /LibreClinica/j_spring_security_check>
    AuthType None
    Require all granted
</Location>
<Location /LibreClinica/j_spring_security_logout>
    AuthType None
    Require all granted
</Location>

# Static assets — Shibboleth auth is not required to fetch JS/CSS/images.
# This significantly cuts the latency of authenticated page loads
# (a single TLS round-trip vs. N for every asset).
<Location /LibreClinica/includes>
    AuthType None
    Require all granted
</Location>
<Location /LibreClinica/images>
    AuthType None
    Require all granted
</Location>
<Location /LibreClinica/help>
    AuthType None
    Require all granted
</Location>

# Health-check endpoints unauthenticated — k8s/load-balancer probes
# match Phase C.15 actuator wiring.
<Location /LibreClinica/actuator/health>
    AuthType None
    Require all granted
</Location>
<Location /LibreClinica/actuator/info>
    AuthType None
    Require all granted
</Location>

# Shibboleth's own handler paths (login redirect, ACS, metadata, etc).
# Apache mod_shib intercepts these before passing to the proxy.
<Location /Shibboleth.sso>
    SetHandler shib
</Location>
